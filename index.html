<script>
    function showmessage(){

        var emailtext = document.getElementById("email").value;
        var errors = false;
        var emerr = document.getElementById("emailerror");
        if (!emailtext.includes('@')) {
            
            emerr.textContent="Email is wrong. Message could not be sent. Please try again.";
            emerr.style.color ="red";
            errors = true;
        }
        if ( errors  == false) {
            var msg1 = document.getElementById("message1");
            msg1.innerHTML = "<i>Message Sent! Reply will get back to you within 48 hours.";
            emerr.textContent="";
        }
    }
</script>
